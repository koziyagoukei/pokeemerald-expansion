name: CI

on:
  push:
    branches:
      - master
      - upcoming
  pull_request:

env:
  GAME_REVISION: 0
  GAME_LANGUAGE: ENGLISH
  COMPARE: 0
  UNUSED_ERROR: 1
  DEPRECATED_ERROR: 1

jobs:
  jp-text-check:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Japanese text imports
        run: python3 tools/check_jp_text.py

  # Gate job: satisfies the "build" branch protection rule.
  # The CI for this fork intentionally runs only the Japanese text check.
  build:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: [jp-text-check]
    steps:
      - name: Japanese text check passed
        run: echo "Japanese text check passed."

  allcontributors:
    if: github.actor == 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Automatically pass for allcontributors
        run: echo "CI automatically passes for allcontributors" && exit 0
